services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: origem_wp
      MYSQL_USER: origem
      MYSQL_PASSWORD: origem123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: origem_wp
      WORDPRESS_DB_USER: origem
      WORDPRESS_DB_PASSWORD: origem123
    volumes:
      - wp_data:/var/www/html
      - ./origem-wp-theme:/var/www/html/wp-content/themes/origem-wp-theme

volumes:
  db_data:
  wp_data:
